<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fahamu Shamba - {{ translations[current_lang]['title'] }}{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo">
                <i class="fas fa-seedling"></i>
                <h1>Fahamu Shamba</h1>
            </div>
            <div class="language-selector">
                <label for="language-select">Language</label>
                <select id="language-select" onchange="changeLanguage(this.value)">
                    <option value="en" {% if current_lang == 'en' %}selected{% endif %}>English</option>
                    <option value="sw" {% if current_lang == 'sw' %}selected{% endif %}>Kiswahili</option>
                    <option value="fr" {% if current_lang == 'fr' %}selected{% endif %}>Francais</option>
                </select>
            </div>
        </div>

        <div class="auth-content">
            {% block content %}{% endblock %}
        </div>

        <div class="auth-footer">
            <p>&copy; 2024 Fahamu Shamba. {{ translations[current_lang]['rights'] }}</p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/auth.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
